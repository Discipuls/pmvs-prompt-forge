name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-test-and-ftl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      JAVA_VERSION: '17'
      APP_APK_PATH: app/build/outputs/apk/debug/app-debug.apk
      TEST_APK_PATH: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
      FTL_RESULTS_DIR: test-lab-results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK and androidTest APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Verify APK files exist
        run: |
          test -f "${APP_APK_PATH}"
          test -f "${TEST_APK_PATH}"
          ls -lah "${APP_APK_PATH}" "${TEST_APK_PATH}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        run: gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Run UI tests in Firebase Test Lab
        run: |
          mkdir -p "${FTL_RESULTS_DIR}"

          gcloud firebase test android run \
            --type instrumentation \
            --app "${APP_APK_PATH}" \
            --test "${TEST_APK_PATH}" \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --timeout 20m \
            --use-orchestrator \
            --num-flaky-test-attempts 1 \
            --results-bucket "gs://${{ secrets.FTL_RESULTS_BUCKET }}" \
            --results-dir "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --client-details matrixLabel="GitHubActions-${GITHUB_RUN_ID}" \
            --format=json > "${FTL_RESULTS_DIR}/firebase-test-lab-result.json"

      - name: Upload Firebase Test Lab result metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-lab-metadata
          path: test-lab-results/

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.APP_APK_PATH }}

      - name: Upload androidTest APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest-apk
          path: ${{ env.TEST_APK_PATH }}