name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/

  ui-tests-firebase:
    name: UI tests (Firebase Test Lab)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build app and test APKs
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Verify APKs exist
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          test -f app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          ls -lah app/build/outputs/apk/debug/
          ls -lah app/build/outputs/apk/androidTest/debug/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
  
      - name: Run UI tests on Firebase Test Lab
        run: |
          mkdir -p test-lab-results
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=MediumPhone.arm,version=33,locale=en,orientation=portrait \
            --timeout 20m \
            --use-orchestrator \
            --format=json > test-lab-results/result.json

      - name: Upload Firebase Test Lab metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-lab-metadata
          path: test-lab-results/

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk